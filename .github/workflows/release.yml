name: Build and Publish Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "VBA C#.sln"

      - name: Build add-in (Release)
        run: msbuild "VBEAddIn.csproj" /p:Configuration=Release /t:Clean,Build /nologo /v:minimal

      - name: Build installer (Release)
        run: msbuild "Installer\Installer.csproj" /p:Configuration=Release /t:Rebuild /nologo /v:minimal

      - name: Verify installer exists
        shell: pwsh
        run: |
          $path = "Installer/bin/Release/VBEAddIn-Installer.exe"
          if (-not (Test-Path $path)) {
            Write-Error "Installer not found at $path"
          }

      - name: Prepare versioned installer asset
        id: prepare_asset
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $source = "Installer/bin/Release/VBEAddIn-Installer.exe"
          $version = "$env:TAG_NAME"
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          $versioned = "Installer/bin/Release/VBEAddIn-Installer-$version.exe"
          Copy-Item -Path $source -Destination $versioned -Force
          "versioned_installer=$versioned" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.prepare_asset.outputs.versioned_installer }}
          fail_on_unmatched_files: true

      - name: Keep latest 9 releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keep = 9;

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );

            const published = releases
              .filter(r => !r.draft && !r.prerelease)
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const toDelete = published.slice(keep);

            core.info(`Found ${published.length} published releases, keeping ${keep}, deleting ${toDelete.length}.`);

            for (const rel of toDelete) {
              core.info(`Deleting release ${rel.tag_name} (${rel.id})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.id });

              try {
                core.info(`Deleting tag ${rel.tag_name}`);
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${rel.tag_name}` });
              } catch (err) {
                core.warning(`Could not delete tag ${rel.tag_name}: ${err.message}`);
              }
            }
